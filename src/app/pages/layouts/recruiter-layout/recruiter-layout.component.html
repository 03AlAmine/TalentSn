<div class="layout">
  <!-- Sidebar -->
  <aside class="sidebar" [class.sidebar--open]="sidebarOpen">
    <div class="sidebar__header">
      <div class="logo">
      <img class="logo-icon" src="assets/logo.png" alt="Logo TalentSn" />
      <span class="logo-text"
        >Talent<span class="logo-highlight">Sn</span></span
      >
      </div>
      <button class="sidebar__close" (click)="closeSidebar()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
          <line x1="18" y1="6" x2="6" y2="18"></line>
          <line x1="6" y1="6" x2="18" y2="18"></line>
        </svg>
      </button>
    </div>

    <div class="sidebar__user">
      <div class="user-card">
        <div class="user-card__avatar">
          <img *ngIf="photoURL" [src]="photoURL" [alt]="fullName">
          <span *ngIf="!photoURL" class="avatar-placeholder">{{ initials }}</span>
        </div>
        <div class="user-card__info">
          <div class="user-card__name">{{ fullName }}</div>
          <div class="user-card__role">{{ position }}</div>
        </div>
      </div>
      <div class="user-card__company" *ngIf="companyName">
        <svg class="company-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M3 21h18M3 10h18M5 6l7-3 7 3M4 10v11h16V10M8 14h.01M12 14h.01M16 14h.01" stroke="currentColor" stroke-linecap="round"/>
        </svg>
        <span class="company-name">{{ companyName }}</span>
      </div>
    </div>

    <nav class="sidebar__nav">
      <a class="nav-link" routerLink="/recruiter/dashboard" routerLinkActive="nav-link--active" (click)="closeSidebar()">
        <svg class="nav-link__icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <rect x="3" y="3" width="7" height="7" rx="1" stroke="currentColor"/>
          <rect x="14" y="3" width="7" height="7" rx="1" stroke="currentColor"/>
          <rect x="3" y="14" width="7" height="7" rx="1" stroke="currentColor"/>
          <rect x="14" y="14" width="7" height="7" rx="1" stroke="currentColor"/>
        </svg>
        <span class="nav-link__label">Tableau de bord</span>
      </a>

      <a class="nav-link" routerLink="/recruiter/offers" routerLinkActive="nav-link--active" (click)="closeSidebar()">
        <svg class="nav-link__icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M4 4h16v16H4zM8 4v16M16 4v16M4 12h16" stroke="currentColor" stroke-linecap="round"/>
        </svg>
        <span class="nav-link__label">Mes offres</span>
      </a>

      <a class="nav-link" routerLink="/recruiter/applications" routerLinkActive="nav-link--active" (click)="closeSidebar()">
        <svg class="nav-link__icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M4 4h16v16H4z" stroke="currentColor"/>
          <path d="M8 8h8M8 12h6M8 16h4" stroke="currentColor" stroke-linecap="round"/>
        </svg>
        <span class="nav-link__label">Candidatures</span>
      </a>

      <a class="nav-link" routerLink="/recruiter/talents" routerLinkActive="nav-link--active" (click)="closeSidebar()">
        <svg class="nav-link__icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <circle cx="10" cy="9" r="4" stroke="currentColor"/>
          <path d="M4 20c0-3.314 2.686-6 6-6s6 2.686 6 6" stroke="currentColor" stroke-linecap="round"/>
          <path d="M17 6.5a2.5 2.5 0 100 5 2.5 2.5 0 000-5zM20 20c0-2.21-1.79-4-4-4" stroke="currentColor" stroke-linecap="round"/>
        </svg>
        <span class="nav-link__label">Explorer talents</span>
      </a>

      <a class="nav-link" routerLink="/recruiter/messages" routerLinkActive="nav-link--active" (click)="closeSidebar()">
        <svg class="nav-link__icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z" stroke="currentColor" stroke-linecap="round"/>
        </svg>
        <span class="nav-link__label">Messages</span>
      </a>

      <a class="nav-link" routerLink="/recruiter/interviews" routerLinkActive="nav-link--active" (click)="closeSidebar()">
        <svg class="nav-link__icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <rect x="3" y="4" width="18" height="18" rx="2" stroke="currentColor"/>
          <path d="M8 2v4M16 2v4M3 10h18" stroke="currentColor" stroke-linecap="round"/>
          <circle cx="12" cy="15" r="1" fill="currentColor"/>
          <circle cx="16" cy="15" r="1" fill="currentColor"/>
          <circle cx="8" cy="15" r="1" fill="currentColor"/>
        </svg>
        <span class="nav-link__label">Entretiens</span>
      </a>

      <div class="nav-divider"></div>

      <a class="nav-link" routerLink="/recruiter/company" routerLinkActive="nav-link--active" (click)="closeSidebar()">
        <svg class="nav-link__icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M4 4h16v16H4z" stroke="currentColor"/>
          <path d="M9 4v16M15 4v16M4 9h16M4 15h16" stroke="currentColor" stroke-linecap="round"/>
          <circle cx="12" cy="12" r="2" fill="currentColor"/>
        </svg>
        <span class="nav-link__label">Entreprise</span>
      </a>

      <a class="nav-link" routerLink="/recruiter/profile" routerLinkActive="nav-link--active" (click)="closeSidebar()">
        <svg class="nav-link__icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <circle cx="12" cy="8" r="4" stroke="currentColor"/>
          <path d="M5 20v-2a7 7 0 0 1 14 0v2" stroke="currentColor" stroke-linecap="round"/>
        </svg>
        <span class="nav-link__label">Mon profil</span>
      </a>
    </nav>

    <div class="sidebar__footer">
      <button class="btn-publish" routerLink="/recruiter/offers/create" (click)="closeSidebar()">
        <svg class="btn-publish__icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="12" y1="5" x2="12" y2="19" stroke="currentColor"/>
          <line x1="5" y1="12" x2="19" y2="12" stroke="currentColor"/>
        </svg>
        <span>Publier une offre</span>
      </button>
      <button class="btn-logout" (click)="logout()">
        <svg class="btn-logout__icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" stroke="currentColor" stroke-linecap="round"/>
          <path d="M16 17l4-4-4-4M20 13H9" stroke="currentColor" stroke-linecap="round"/>
        </svg>
        <span>Déconnexion</span>
      </button>
    </div>
  </aside>

  <!-- Overlay -->
  <div class="overlay" *ngIf="sidebarOpen" (click)="closeSidebar()"></div>

  <!-- Main Content -->
  <main class="main">
    <!-- Topbar -->
    <header class="topbar">
      <button class="topbar__burger" (click)="toggleSidebar()">
        <span></span>
        <span></span>
        <span></span>
      </button>

      <!-- Breadcrumb -->
      <nav class="breadcrumb">
        <ng-container *ngFor="let item of getBreadcrumbItems(); let last = last">
          <a *ngIf="item.path && !last" class="breadcrumb__link" (click)="navigateTo(item.path!)">
            {{ item.label }}
          </a>
          <span *ngIf="!item.path || last" class="breadcrumb__current">
            {{ item.label }}
          </span>
          <span *ngIf="!last" class="breadcrumb__separator">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <polyline points="9 18 15 12 9 6" stroke="currentColor"/>
            </svg>
          </span>
        </ng-container>
      </nav>

      <div class="topbar__actions">
        <button class="btn-primary-sm" routerLink="/recruiter/offers/create">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="12" y1="5" x2="12" y2="19"/>
            <line x1="5" y1="12" x2="19" y2="12"/>
          </svg>
          <span>Nouvelle offre</span>
        </button>

        <!-- User Menu -->
        <div class="user-menu" (click)="toggleUserMenu()">
          <div class="user-menu__avatar">
            <img *ngIf="photoURL" [src]="photoURL" [alt]="fullName">
            <span *ngIf="!photoURL">{{ initials }}</span>
          </div>
          <span class="user-menu__name">{{ fullName }}</span>
          <svg class="user-menu__arrow" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="6 9 12 15 18 9"/>
          </svg>

          <div class="dropdown" *ngIf="userMenuOpen">
            <a class="dropdown__item" routerLink="/recruiter/profile">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                <circle cx="12" cy="8" r="4"/>
                <path d="M5 20v-2a7 7 0 0 1 14 0v2"/>
              </svg>
              Mon profil
            </a>
            <a class="dropdown__item" routerLink="/recruiter/company">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                <path d="M4 4h16v16H4z"/>
                <path d="M9 4v16M15 4v16M4 9h16M4 15h16"/>
              </svg>
              Entreprise
            </a>
            <div class="dropdown__divider"></div>
            <button class="dropdown__item dropdown__item--danger" (click)="logout()">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
                <path d="M16 17l4-4-4-4M20 13H9"/>
              </svg>
              Déconnexion
            </button>
          </div>
        </div>
      </div>
    </header>

    <!-- Page Content -->
    <div class="page-content">
      <router-outlet></router-outlet>
    </div>
  </main>
</div>
