<!-- candidate-layout.component.html (CORRIGÉ) -->
<div class="layout">
  <!-- Sidebar -->
  <aside class="sidebar" [class.sidebar--open]="sidebarOpen">
    <div class="sidebar__header">
      <div class="logo">
        <img class="logo-icon" src="assets/logo.png" alt="Logo TalentSn" />
        <span class="logo-text">Talent<span class="logo-highlight">Sn</span></span>
      </div>
      <button class="sidebar__close" (click)="closeSidebar()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="18" y1="6" x2="6" y2="18"></line>
          <line x1="6" y1="6" x2="18" y2="18"></line>
        </svg>
      </button>
    </div>

    <div class="sidebar__user">
      <div class="user-card__avatar" routerLink="/candidate/profile">
        <img *ngIf="photoURL" [src]="photoURL" [alt]="fullName">
        <span *ngIf="!photoURL" class="avatar-placeholder">{{ initials }}</span>
      </div>
      <div class="user-card__name">{{ fullName }}</div>
      <div class="user-card__role">{{ title }}</div>
      <div class="profile-completion">
        <div class="completion-bar">
          <div class="completion-fill" [style.width.%]="0"></div>
        </div>
        <div class="completion-text">Profil à compléter</div>
      </div>
    </div>

    <nav class="sidebar__nav">
      <a class="nav-link"
         *ngFor="let item of navItems"
         [routerLink]="item.path"
         routerLinkActive="nav-link--active"
         (click)="closeSidebar()">
        <svg class="nav-link__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <path [attr.d]="item.icon" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        <span class="nav-link__label">{{ item.label }}</span>
      </a>
    </nav>

    <div class="sidebar__footer">
      <button class="btn-logout" (click)="logout()">
        <svg class="btn-logout__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4" stroke="currentColor" stroke-linecap="round"/>
          <path d="M16 17l4-4-4-4M20 13H9" stroke="currentColor" stroke-linecap="round"/>
        </svg>
        <span>Déconnexion</span>
      </button>
    </div>
  </aside>

  <!-- Overlay -->
  <div class="overlay" *ngIf="sidebarOpen" (click)="closeSidebar()"></div>

  <!-- Main Content -->
  <main class="main">
    <!-- Topbar -->
    <header class="topbar">
      <button class="topbar__burger" (click)="toggleSidebar()">
        <span></span>
        <span></span>
        <span></span>
      </button>

      <!-- Breadcrumb -->
      <nav class="breadcrumb">
        <ng-container *ngFor="let item of getBreadcrumbItems(); let last = last">
          <a *ngIf="item.path && !last" class="breadcrumb__link" [routerLink]="item.path!">
            {{ item.label }}
          </a>
          <span *ngIf="!item.path || last" class="breadcrumb__current">
            {{ item.label }}
          </span>
          <span *ngIf="!last" class="breadcrumb__separator">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <polyline points="9 18 15 12 9 6"/>
            </svg>
          </span>
        </ng-container>
      </nav>

      <div class="topbar__actions">
        <!-- User Menu -->
        <div class="user-menu" (click)="toggleUserMenu()">
          <div class="user-menu__avatar">
            <img *ngIf="photoURL" [src]="photoURL" [alt]="fullName">
            <span *ngIf="!photoURL">{{ initials }}</span>
          </div>
          <span class="user-menu__name">{{ fullName }}</span>
          <svg class="user-menu__arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="6 9 12 15 18 9"/>
          </svg>

          <div class="dropdown" *ngIf="userMenuOpen">
            <a class="dropdown__item" routerLink="/candidate/profile">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                <circle cx="12" cy="8" r="4"/>
                <path d="M5 20v-2a7 7 0 0 1 14 0v2"/>
              </svg>
              Mon profil
            </a>
            <div class="dropdown__divider"></div>
            <button class="dropdown__item dropdown__item--danger" (click)="logout()">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
                <path d="M16 17l4-4-4-4M20 13H9"/>
              </svg>
              Déconnexion
            </button>
          </div>
        </div>
      </div>
    </header>

    <!-- Page Content -->
    <div class="page-content">
      <router-outlet></router-outlet>
    </div>
  </main>
</div>
